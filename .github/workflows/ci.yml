name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Rust Tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust unit tests
        run: cargo test -p ovn-core

      - name: Check (all crates)
        run: cargo check

      - name: Clippy (lint)
        run: cargo clippy -- -D warnings

  test-node:
    name: Node.js Integration — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [test-rust]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build native addon (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/build.sh --skip-npm

      - name: Build native addon (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build.ps1 -SkipNpm

      - name: Run integration tests
        run: node --test tests/integration/engine.test.js
